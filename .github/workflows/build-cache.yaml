name: Build and push to Cachix
on:
  push:
    branches: [main]
    paths:
      - "**/*.nix"
      - "flake.lock"
  pull_request:
    paths:
      - "**/*.nix"
      - "flake.lock"
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.hosts.outputs.hosts }}
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
      - id: hosts
        run: |
          echo "hosts=$(nix eval .#nixosConfigurations --apply builtins.attrNames --json)" >> "$GITHUB_OUTPUT"
      - id: packages
        run: |
          echo "packages=$(nix eval .#packages.x86_64-linux --apply builtins.attrNames --json)" >> "$GITHUB_OUTPUT"
  build-hosts:
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.discover.outputs.hosts) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - name: Configure Cachix
        if: github.event_name == 'pull_request'
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
      - name: Configure and publish to Cachix
        if: github.event_name == 'push'
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build host system
        env:
          BUILD_HOST: ${{ matrix.host }}
        run: |
          nix build ".#nixosConfigurations.${BUILD_HOST}.config.system.build.toplevel" \
            --print-build-logs --json
  build-packages:
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover.outputs.packages) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - name: Configure Cachix
        if: github.event_name == 'pull_request'
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
      - name: Configure and publish to Cachix
        if: github.event_name == 'push'
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build package
        env:
          BUILD_PACKAGE: ${{ matrix.package }}
        run: |-
          nix build ".#${BUILD_PACKAGE}" \
            --print-build-logs --json
