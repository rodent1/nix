name: Update nvfetcher
on:
  workflow_dispatch: {}
  schedule:
    - cron: 0 3 * * *
  push:
    branches:
      - main
    paths:
      - modules/packages/nvfetcher.toml
concurrency:
  group: update-nvfetcher
  cancel-in-progress: true
permissions:
  contents: write
  pull-requests: write
jobs:
  update-nvfetcher:
    runs-on: ubuntu-latest
    steps:
      - name: Load Secrets
        id: load-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GITHUB_BOT_APP_CLIENT_ID: op://home-ops/github-bot/GITHUB_BOT_APP_CLIENT_ID
          GITHUB_BOT_APP_PRIVATE_KEY: op://home-ops/github-bot/GITHUB_BOT_APP_PRIVATE_KEY
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_CLIENT_ID }}
          private-key: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88 # v3.21.7
      - name: Run nvfetcher
        id: run-nvfetcher
        run: |
          set -euo pipefail
          cd modules/packages
          change_log="$(mktemp)"

          nix-shell -p nvfetcher --command "nvfetcher -l $change_log --keep-old"

          {
            echo 'changes<<EOF'
            if test -s "$change_log"; then
              cat "$change_log"
            else
              echo 'No dependency updates.'
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Detect changes
        id: detect-changes
        run: |
          if git diff --quiet -- modules/packages; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
          else
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          fi
      - name: Validate updated packages
        if: steps.detect-changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          nix flake check --no-build

          for package in $(nix eval .#packages.x86_64-linux --apply 'packages: builtins.concatStringsSep "\n" (builtins.attrNames packages)' --raw); do
            nix build ".#${package}" --print-build-logs
          done
      - name: Create Pull Request
        id: create-pull-request
        if: steps.detect-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: nvfetcher/deps
          title: "chore(deps): Update packages managed by nvfetcher"
          commit-message: "chore(deps): Update packages managed by nvfetcher"
          body: |
            ## Changes:
            ${{ steps.run-nvfetcher.outputs.changes }}
          add-paths: |
            modules/packages/**
          delete-branch: true
